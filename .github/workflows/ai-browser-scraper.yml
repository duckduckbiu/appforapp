name: AI Browser Scraper

# Playwright + trafilatura (no-LLM extraction) + OpenRouter (polish only)
# LLM cost: ~$0.001 per article (single call for rewriting)
#
# Required GitHub Secrets:
#   SUPABASE_URL              — Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY — service role key
#   OPENROUTER_API_KEY        — OpenRouter API key (polish step only)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      max_articles:
        description: 'Max articles per source'
        required: false
        default: '10'
      max_sources:
        description: 'Max sources per run'
        required: false
        default: '20'
      model:
        description: 'OpenRouter model for polish step'
        required: false
        default: 'google/gemini-2.0-flash-001'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-browser.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements-browser.txt
          playwright install chromium

      - name: Run News Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MAX_ARTICLES_PER_SOURCE: ${{ github.event.inputs.max_articles || '10' }}
          MAX_SOURCES_PER_RUN: ${{ github.event.inputs.max_sources || '20' }}
          LLM_MODEL: ${{ github.event.inputs.model || 'google/gemini-2.0-flash-001' }}
          PYTHONUNBUFFERED: '1'
        run: |
          cd scripts
          python ai_browser_scraper.py
