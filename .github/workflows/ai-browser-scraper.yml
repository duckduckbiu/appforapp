name: AI Browser Scraper

# Uses browser-use + Gemini to visit news websites and extract articles.
# Sources are managed in admin panel (feed_sources with source_type = 'browser_use').
#
# Required GitHub Secrets:
#   SUPABASE_URL              — Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY — service role key
#   GOOGLE_API_KEY            — Google AI Studio API key (Gemini free tier)

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours (browser-use is slower than RSS)
  workflow_dispatch:
    inputs:
      max_articles:
        description: 'Max articles per source (default: 10)'
        required: false
        default: '10'
      max_sources:
        description: 'Max sources per run (default: 20)'
        required: false
        default: '20'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-browser.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements-browser.txt
          playwright install chromium

      - name: Run AI Browser Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          MAX_ARTICLES_PER_SOURCE: ${{ github.event.inputs.max_articles || '10' }}
          MAX_SOURCES_PER_RUN: ${{ github.event.inputs.max_sources || '20' }}
          PYTHONUNBUFFERED: '1'
        run: |
          cd scripts
          python ai_browser_scraper.py
