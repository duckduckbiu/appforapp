name: News Fetch (GDELT + fundus)

# Replaces the old RSS-based scheduled-feed-fetch workflow.
#
# Architecture:
#   fundus    — crawls 171 major publishers directly (full content, best accuracy)
#   GDELT     — free news index, 100+ languages, no API key needed
#   trafilatura — extracts full text from GDELT article URLs
#
# Required GitHub Secrets:
#   SUPABASE_URL              — your Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY — service role key (NOT the anon key)

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to run: fundus | gdelt | both'
        required: false
        default: 'both'
      max_fundus:
        description: 'Max articles from fundus (default: 50)'
        required: false
        default: '50'
      max_gdelt:
        description: 'Max articles per GDELT query (default: 20)'
        required: false
        default: '20'

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch and store news
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SOURCE: ${{ github.event.inputs.source || 'both' }}
          MAX_FUNDUS_ARTICLES: ${{ github.event.inputs.max_fundus || '50' }}
          MAX_GDELT_PER_QUERY: ${{ github.event.inputs.max_gdelt || '20' }}
        run: |
          cd scripts
          python fetch_news.py
