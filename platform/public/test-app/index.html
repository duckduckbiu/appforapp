<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDK 测试应用</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h1 { font-size: 20px; margin-bottom: 8px; color: #fff; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
    .btn-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    button {
      padding: 12px 16px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #2a2a3e;
      color: #e0e0e0;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover { background: #3a3a4e; border-color: #555; }
    button:active { background: #4a4a5e; }
    button .label { font-weight: 600; display: block; }
    button .desc { font-size: 12px; color: #888; margin-top: 2px; }
    .status {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .status.connecting { background: #2a2a3e; color: #888; }
    .status.connected { background: #1a3a2a; color: #4ade80; }
    .status.error { background: #3a1a1a; color: #f87171; }
    #log {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-entry { margin-bottom: 4px; }
    .log-entry.success { color: #4ade80; }
    .log-entry.error { color: #f87171; }
    .log-entry.info { color: #60a5fa; }
  </style>
</head>
<body>
  <h1>SDK 测试应用</h1>
  <p class="subtitle">验证 iframe ↔ 平台 SDK 通信</p>

  <div id="connection-status" class="status connecting">⏳ 正在连接平台...</div>

  <div class="btn-group">
    <button onclick="testGetUserInfo()" id="btn-user">
      <span class="label">1. 获取用户信息</span>
      <span class="desc">调用 user.getInfo() → 返回当前用户</span>
    </button>
    <button onclick="testShowToast()" id="btn-toast">
      <span class="label">2. 发送 Toast</span>
      <span class="desc">调用 ui.showToast() → 平台显示通知</span>
    </button>
    <button onclick="testGetTheme()" id="btn-theme">
      <span class="label">3. 获取主题</span>
      <span class="desc">调用 ui.getTheme() → 获取 Design Token</span>
    </button>
  </div>

  <div id="log"></div>

  <!-- Penpal v6 ESM (local copy) -->
  <script type="module">
    import { connect, WindowMessenger } from "./penpal.mjs";

    const logEl = document.getElementById("log");
    const statusEl = document.getElementById("connection-status");
    let platform = null;

    function log(message, type = "info") {
      const entry = document.createElement("div");
      entry.className = `log-entry ${type}`;
      const time = new Date().toLocaleTimeString("zh-CN", { hour12: false });
      entry.textContent = `[${time}] ${message}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Connect to the parent platform via Penpal v6
    async function initSDK() {
      try {
        log("初始化 SDK，连接平台...");
        const messenger = new WindowMessenger({
          remoteWindow: window.parent,
          allowedOrigins: ["*"]
        });
        const connection = connect({
          messenger,
          methods: {
            // Platform can push events to us
            handleEvent(event) {
              log(`收到平台事件: ${JSON.stringify(event)}`, "info");
            }
          }
        });

        platform = await connection.promise;
        statusEl.className = "status connected";
        statusEl.textContent = "✅ 已连接平台";
        log("SDK 连接成功！", "success");
      } catch (err) {
        statusEl.className = "status error";
        statusEl.textContent = "❌ 连接失败";
        log(`连接失败: ${err.message}`, "error");
      }
    }

    // Helper: call platform SDK method
    async function callSDK(module, method, params) {
      if (!platform) {
        log("SDK 未连接，请等待...", "error");
        return null;
      }
      try {
        const response = await platform.handleSDKRequest(module, method, params);
        return response;
      } catch (err) {
        log(`调用失败: ${err.message}`, "error");
        return null;
      }
    }

    // Test 1: Get user info
    window.testGetUserInfo = async function() {
      log("→ 调用 user.getInfo()...");
      const res = await callSDK("user", "getInfo");
      if (res && res.success) {
        log(`← 用户信息: ${JSON.stringify(res.data, null, 2)}`, "success");
      } else {
        log(`← 失败: ${JSON.stringify(res?.error)}`, "error");
      }
    };

    // Test 2: Show toast
    window.testShowToast = async function() {
      log('→ 调用 ui.showToast("来自测试应用的消息")...');
      const res = await callSDK("ui", "showToast", {
        message: "来自测试应用的消息",
        type: "success"
      });
      if (res && res.success) {
        log("← Toast 发送成功！检查平台顶部通知。", "success");
      } else {
        log(`← 失败: ${JSON.stringify(res?.error)}`, "error");
      }
    };

    // Test 3: Get theme
    window.testGetTheme = async function() {
      log("→ 调用 ui.getTheme()...");
      const res = await callSDK("ui", "getTheme");
      if (res && res.success) {
        log(`← 主题 Token:\n${JSON.stringify(res.data, null, 2)}`, "success");
        // Apply primary color as a visual demo
        if (res.data && res.data.primary) {
          document.body.style.borderTop = `3px solid ${res.data.primary}`;
          log(`已应用主色: ${res.data.primary}`, "info");
        }
      } else {
        log(`← 失败: ${JSON.stringify(res?.error)}`, "error");
      }
    };

    // Auto-init on load
    initSDK();
  </script>
</body>
</html>
